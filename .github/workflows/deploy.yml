name: Build & Verify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
        env:
          SITE: https://gregorythegreat.ca

  verify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Cloudflare Pages deployment
        run: sleep 60
      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ggi-website.pages.dev/)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Site returned $STATUS"
            exit 1
          fi
          echo "✅ Site is live (200)"
